<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lovetta Ad Banner Editor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #0a0a0f; color: #aaa; display: flex; height: 100vh; overflow: hidden; }
  #sidebar { width: 340px; background: #101018; padding: 20px; overflow-y: auto; border-right: 1px solid #1a1a2e; flex-shrink: 0; }
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  #main { flex: 1; overflow: auto; padding: 24px; }
  .banner-grid { display: flex; flex-wrap: wrap; gap: 24px; align-items: flex-start; }
  h2 { color: #d6336c; margin-bottom: 4px; font-size: 16px; letter-spacing: 2px; }
  .subtitle { color: #444; font-size: 11px; margin-bottom: 16px; }
  h3 { color: #555; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; margin: 14px 0 6px; padding-top: 10px; border-top: 1px solid #1a1a2e; }
  label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; font-size: 12px; }
  label span { min-width: 90px; color: #777; }
  input[type="text"], input[type="number"], select, textarea {
    background: #16161e; border: 1px solid #2a2a3a; color: #ddd; padding: 4px 7px;
    border-radius: 4px; width: 150px; font-size: 12px; outline: none; font-family: inherit;
  }
  textarea { width: 100%; height: 26px; resize: vertical; margin-bottom: 3px; }
  input[type="color"] { width: 28px; height: 24px; border: 1px solid #2a2a3a; background: #16161e; cursor: pointer; border-radius: 3px; padding: 1px; }
  .color-pair { display: flex; align-items: center; gap: 4px; width: 150px; }
  .color-pair input[type="text"] { width: 95px; }
  .presets { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }
  .presets button { padding: 4px 8px; font-size: 11px; border: 1px solid #2a2a3a; background: #16161e; color: #888; border-radius: 4px; cursor: pointer; }
  .presets button:hover { color: #d6336c; border-color: #d6336c; }
  .btn-row { display: flex; gap: 5px; margin-top: 14px; flex-wrap: wrap; }
  .btn-row button { flex: 1; min-width: 55px; padding: 9px 6px; background: linear-gradient(135deg, #d6336c, #f43f5e); color: #fff; border: none; border-radius: 6px; font-size: 10px; font-weight: 600; cursor: pointer; }
  .card { flex-shrink: 0; }
  .card canvas { border-radius: 6px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); display: block; }
  .card-label { text-align: center; font-size: 10px; color: #444; margin-top: 4px; }
  input[type="checkbox"] { accent-color: #d6336c; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Sora:wght@400;600;700;800&family=Montserrat:wght@400;600;700;800;900&family=Playfair+Display:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div id="sidebar">
  <h2>Lovetta</h2>
  <div class="subtitle">AD BANNERS</div>

  <h3>Presets</h3>
  <div class="presets" id="presetBtns"></div>

  <h3>Card Image</h3>
  <label><span>Image</span>
    <select id="cardImage" onchange="renderAll();">
      <optgroup label="4-Card Grids">
      </optgroup>

      </optgroup>

  <h3>Background</h3>

  <label><span>Headline</span>
    <select id="headlinePreset" onchange="document.getElementById('headlineText').value=this.value;renderAll();" style="width:150px;">

      <option value="Meet Your AI Soulmate">Meet Your AI Soulmate</option>
      <option value="AI Companion Awaits">AI Companion Awaits</option>
      <option value="Chat With AI Girls">Chat With AI Girls</option>
      <option value="Your AI Girl Is Here">Your AI Girl Is Here</option>
      <option value="Find Your AI Soulmate">Find Your AI Soulmate</option>
      <option value="AI Girlfriend Experience">AI Girlfriend Experience</option>
      <option value="Create Your AI Girl">Create Your AI Girl</option>
      <option value="Your Dream AI Companion">Your Dream AI Companion</option>
      <option value="AI Soulmate. Real Feelings.">AI Soulmate. Real Feelings.</option>

  <label><span>Font</span>
    <select id="headlineFont">

  <label><span>Radius</span><input type="number" id="ctaRadius" value="8" min="0" max="30"></label>

  <div class="btn-row">

  <div style="color:#555;font-size:10px;margin-top:4px;">Start with: <code style="color:#d6336c;">node scripts/ads_server.js</code></div>

  <h3>Card Screenshot Tool</h3>
  <label><span>Girl</span>
    <select id="snapGirl"></select>
  </label>
  <div class="btn-row">
    <button onclick="loadSnap()">Play Video</button>
    <button onclick="captureSnap()">📸 Capture Frame</button>
  </div>
  <div id="snapStatus" style="color:#555;font-size:10px;margin-top:4px;">Pick a girl and play her video. Pause at the best frame and capture.</div>
</div>

<div id="main">
  <div class="banner-grid" id="grid"></div>
</div>

<script>
// ========== CONFIG ==========
const S = 2; // retina scale

// All sizes with HARDCODED layouts (pixel positions at 2x)
// Each layout: { headline: {x,y,size,maxW,align}, cta: {x,y,size,padH,padV}, logo: {x,y,maxW}, cards: [{x,y,w,h},...] }
const BANNERS = {
  // Cards are 3:4 aspect ratio. All positions in canvas coords (2x).
  // Card sizes MUST keep 3:4 ratio: if w=X then h=X*4/3

  '300x250': {
    w: 300, h: 250, name: 'Medium Rectangle',
    // canvas 600x500. Cards right, text left.
    logo: { x: 24, y: 16, maxW: 169 },
    headline: { x: 24, y: 110, size: 48, maxW: 200, align: 'left' },
    cta: { x: 24, y: 340, size: 36, bw: 200, bh: 56 },
    cards1: [{ x: 260, y: 16, w: 320, h: 427 }],
    cards4: [
      { x: 246, y: 8, w: 168, h: 224 },  { x: 422, y: 8, w: 168, h: 224 },
      { x: 246, y: 240, w: 168, h: 224 }, { x: 422, y: 240, w: 168, h: 224 },
    ],
  },

  '315x300': {
    w: 315, h: 300, name: 'Large Rectangle',
    // canvas 630x600. Cards right, text left.
    logo: { x: 24, y: 16, maxW: 182 },
    headline: { x: 24, y: 110, size: 50, maxW: 210, align: 'left' },
    cta: { x: 24, y: 410, size: 38, bw: 210, bh: 58 },
    cards1: [{ x: 260, y: 16, w: 350, h: 567 }],
    cards4: [
      { x: 246, y: 8, w: 183, h: 280 },  { x: 437, y: 8, w: 183, h: 280 },
      { x: 246, y: 296, w: 183, h: 280 }, { x: 437, y: 296, w: 183, h: 280 },
    ],
  },

  '950x250': {
    w: 950, h: 250, name: 'Billboard',
    // canvas 1900x500. Cards right, text left.
    logo: { x: 40, y: 20, maxW: 234 },
    headline: { x: 40, y: 120, size: 72, maxW: 500, align: 'left' },
    cta: { x: 40, y: 340, size: 40, bw: 260, bh: 64 },
    cards1: [{ x: 620, y: 16, w: 350, h: 467 }],
    cards4: [
      { x: 600, y: 10, w: 300, h: 480 }, { x: 910, y: 10, w: 300, h: 480 },
      { x: 1220, y: 10, w: 300, h: 480 }, { x: 1530, y: 10, w: 300, h: 480 },
    ],
  },

  '970x90': {
    w: 970, h: 90, name: 'Super Leaderboard',
    // canvas 1940x180. Cards left, text right.
    logo: { x: 920, y: 4, maxW: 156 },
    headline: { x: 920, y: 50, size: 44, maxW: 900, align: 'left' },
    cta: { x: 920, y: 116, size: 30, bw: 200, bh: 48 },
    cards1: [{ x: 20, y: 4, w: 129, h: 172 }],
    cards4: [
      { x: 14, y: 2, w: 210, h: 176 }, { x: 230, y: 2, w: 210, h: 176 },
      { x: 446, y: 2, w: 210, h: 176 }, { x: 662, y: 2, w: 210, h: 176 },
    ],
  },

  '468x60': {
    w: 468, h: 60, name: 'Banner',
    // canvas 936x120. Cards left, text right.
    logo: { x: 440, y: 2, maxW: 104 },
    headline: { x: 440, y: 34, size: 30, maxW: 450, align: 'left' },
    cta: { x: 440, y: 78, size: 22, bw: 140, bh: 34 },
    cards1: [{ x: 14, y: 4, w: 84, h: 112 }],
    cards4: [
      { x: 10, y: 2, w: 96, h: 116 }, { x: 110, y: 2, w: 96, h: 116 },
      { x: 210, y: 2, w: 96, h: 116 }, { x: 310, y: 2, w: 96, h: 116 },
    ],
  },

  '300x100': {
    w: 300, h: 100, name: 'Small Banner',
    // canvas 600x200. Cards left, text right.
    logo: { x: 290, y: 4, maxW: 117 },
    headline: { x: 290, y: 48, size: 32, maxW: 280, align: 'left' },
    cta: { x: 290, y: 130, size: 24, bw: 150, bh: 42 },
    cards1: [{ x: 14, y: 8, w: 138, h: 184 }],
    cards4: [
      { x: 8, y: 4, w: 64, h: 192 }, { x: 76, y: 4, w: 64, h: 192 },
      { x: 144, y: 4, w: 64, h: 192 }, { x: 212, y: 4, w: 64, h: 192 },
    ],
  },

  '320x480': {
    w: 320, h: 480, name: 'Mobile Interstitial',
    // canvas 640x960. Cards top, text bottom.
    logo: { x: 24, y: 560, maxW: 182 },
    headline: { x: 24, y: 640, size: 56, maxW: 590, align: 'left' },
    cta: { x: 24, y: 820, size: 40, bw: 260, bh: 64 },
    cards1: [{ x: 60, y: 16, w: 520, h: 520 }],
    cards4: [
      { x: 16, y: 10, w: 300, h: 260 },  { x: 324, y: 10, w: 300, h: 260 },
      { x: 16, y: 278, w: 300, h: 260 }, { x: 324, y: 278, w: 300, h: 260 },
    ],
  },
};

// ========== GIRLS ==========
// Image catalog — built dynamically from server
const CARD_IMAGES = [
  // 4-plex grids (always present)
  { name: 'Grid: Violet+Isabella+Hana+Luna', file: 'grid4_a.png', type: 'grid' },
  { name: 'Grid: Luna+Rei+Chloe+Sakura', file: 'grid4_b.png', type: 'grid' },
];
// All possible single card names (will only show if file exists)
const ALL_GIRLS = ['Lily','Chloe','Jade','Sophia','Ruby','Aria','Zara','Luna','Mia','Emma','Isabella','Violet','Rei','Hana','Sakura','Yuki','Mei','Aiko'];

const cardImages = {};
let logoImg = null;

function loadImg(url) {
  return new Promise(resolve => {
    fetch(url).then(r => {
      if (!r.ok) return resolve(null);
      return r.blob();
    }).then(blob => {
      if (!blob) return resolve(null);
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = URL.createObjectURL(blob);
    }).catch(() => resolve(null));
  });
}

// Load grids + logo, then check which single cards exist
async function loadAllImages() {
  // Load grids
  await Promise.all(CARD_IMAGES.map(c =>
    loadImg('../public/assets/ads/' + c.file).then(img => { cardImages[c.file] = img; })
  ));
  // Load logo
  logoImg = await loadImg('../public/assets/brand/logo_text.png');
  // Try loading each girl — only add to catalog if file exists
  for (const name of ALL_GIRLS) {
    const file = name.toLowerCase() + '.png';
    const img = await loadImg('../public/assets/ads/' + file);
    if (img) {
      cardImages[file] = img;
      CARD_IMAGES.push({ name, file, type: 'single' });
    }
  }
  buildCardDropdown();
  init();
}
loadAllImages();

function buildCardDropdown() {
  const sel = document.getElementById('cardImage');
  const grids = sel.querySelector('optgroup:first-child');
  const singles = sel.querySelector('optgroup:last-child');
  grids.innerHTML = '';
  singles.innerHTML = '';
  CARD_IMAGES.forEach((c, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = c.name;
    if (c.type === 'grid') grids.appendChild(opt);
    else singles.appendChild(opt);
  });
  // Select first available single card, or first grid
  const firstSingle = CARD_IMAGES.findIndex(c => c.type === 'single');
  sel.value = firstSingle >= 0 ? firstSingle : 0;
}

// ========== UTILS ==========
function v(id) { return document.getElementById(id).value; }
function n(id) { return parseFloat(document.getElementById(id).value) || 0; }
function hexRgba(hex, a) {
  const h = hex.replace('#', '');
  return `rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a})`;
}

// Color picker sync
['bg1', 'bg2', 'headlineColor', 'ctaBg'].forEach(id => {
  const p = document.getElementById(id + 'Pick'), t = document.getElementById(id);
  if (!p || !t) return;
  p.oninput = () => { t.value = p.value; renderAll(); };
  t.oninput = () => { if (/^#[0-9a-f]{6}$/i.test(t.value)) p.value = t.value; renderAll(); };
});

// Bind all inputs
document.querySelectorAll('#sidebar input, #sidebar select, #sidebar textarea').forEach(el => {
  el.addEventListener('input', renderAll);
  el.addEventListener('change', renderAll);
});

// Get the currently selected card image and its type
function getSelectedCard() {
  const idx = parseInt(v('cardImage'));
  const entry = CARD_IMAGES[idx];
  return { img: cardImages[entry.file], type: entry.type };
}

// ========== PRESETS ==========
const PRESETS = {
  dark_brand: { bg1: '#1a0a2e', bg2: '#0a0618', headlineFont: 'Outfit', headlineWeight: '700', headlineColor: '#ffffff', textEffect: 'glow', ctaText: 'Chat Now', ctaBg: '#d6336c', ctaRadius: 8 },
  hot_pink: { bg1: '#200818', bg2: '#0a0208', headlineFont: 'Plus Jakarta Sans', headlineWeight: '800', headlineColor: '#ffd6e8', textEffect: 'glow', ctaText: 'Try Free', ctaBg: '#ff2d7b', ctaRadius: 20 },
  minimal: { bg1: '#0f0a1a', bg2: '#050308', headlineFont: 'Sora', headlineWeight: '700', headlineColor: '#e0d0f0', textEffect: 'none', ctaText: 'Meet Her', ctaBg: '#d6336c', ctaRadius: 6 },
  elegant: { bg1: '#140e28', bg2: '#080414', headlineFont: 'Playfair Display', headlineWeight: '700', headlineColor: '#f5e6ff', textEffect: 'shadow', ctaText: 'Start Free', ctaBg: '#d6336c', ctaRadius: 6 },
};

const presetDiv = document.getElementById('presetBtns');
Object.keys(PRESETS).forEach(name => {
  const btn = document.createElement('button');
  btn.textContent = name.replace(/_/g, ' ');
  btn.onclick = () => {
    const p = PRESETS[name];
    Object.keys(p).forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.value = p[id]; const pk = document.getElementById(id+'Pick'); if (pk && /^#/.test(p[id])) pk.value = p[id]; }
    });
    renderAll();
  };
  presetDiv.appendChild(btn);
});

// ========== CANVAS SETUP ==========
const canvasMap = {};
const grid = document.getElementById('grid');

function init() {
  Object.entries(BANNERS).forEach(([key, b]) => {
    const card = document.createElement('div');
    card.className = 'card';
    const canvas = document.createElement('canvas');
    canvas.width = b.w * S;
    canvas.height = b.h * S;
    // CSS display size: show at 1x for 300+ wide, 1.5x for small
    const cssW = b.w <= 200 ? b.w * 1.8 : b.w;
    canvas.style.width = cssW + 'px';
    canvas.style.height = Math.round(cssW * b.h / b.w) + 'px';
    card.appendChild(canvas);
    const lbl = document.createElement('div');
    lbl.className = 'card-label';
    lbl.textContent = `${key} — ${b.name}`;
    card.appendChild(lbl);
    grid.appendChild(card);
    canvasMap[key] = canvas;
  });

  // Export buttons
  const expDiv = document.getElementById('exportBtns');
  Object.keys(BANNERS).forEach(key => {
    const btn = document.createElement('button');
    btn.textContent = key;
    btn.onclick = () => exportBanner(key);
    expDiv.appendChild(btn);
  });
  const allBtn = document.createElement('button');
  allBtn.textContent = 'ALL';
  allBtn.onclick = () => Object.keys(BANNERS).forEach((k, i) => setTimeout(() => exportBanner(k), i * 200));
  expDiv.appendChild(allBtn);

  // "Each Girl 300x250" button
  const eachBtn = document.createElement('button');
  eachBtn.textContent = 'EACH GIRL';
  eachBtn.style.background = 'linear-gradient(135deg, #7c3aed, #a855f7)';
  eachBtn.onclick = () => exportEachGirl();
  expDiv.appendChild(eachBtn);

  renderAll();
}

// ========== RENDER ==========
function renderBanner(key, forExport, scaleOverride) {
  const b = BANNERS[key];
  const sc = scaleOverride || S;
  const r = sc / S; // ratio to scale hardcoded 2x positions
  const W = b.w * sc, H = b.h * sc;
  const canvas = forExport ? document.createElement('canvas') : canvasMap[key];
  if (!canvas) return null;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  if (r !== 1) ctx.scale(r, r); // scale all drawing to target size

  // 1. Background gradient
  const grad = ctx.createLinearGradient(0, 0, W * 0.3, H);
  grad.addColorStop(0, v('bg1'));
  grad.addColorStop(1, v('bg2'));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Subtle glow
  const glow = ctx.createRadialGradient(W * 0.3, H * 0.4, 0, W * 0.3, H * 0.4, Math.max(W, H) * 0.5);
  glow.addColorStop(0, hexRgba(v('ctaBg'), 0.06));
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // 2. Card image — single card or 4-plex grid
  const card = getSelectedCard();
  if (card.img) {
    if (card.type === 'grid') {
      const positions = b.cards4;
      const minX = Math.min(...positions.map(p => p.x));
      const minY = Math.min(...positions.map(p => p.y));
      const maxX = Math.max(...positions.map(p => p.x + p.w));
      const maxY = Math.max(...positions.map(p => p.y + p.h));
      const areaW = maxX - minX;
      const areaH = maxY - minY;
      const areaAR = areaW / areaH;
      const imgAR = card.img.width / card.img.height;
      const r = Math.min(areaW, areaH) * 0.03;

      // Cover-crop: scale to fill area, crop excess
      let drawW, drawH, drawX, drawY;
      if (imgAR > areaAR) {
        // Image wider — fit height, center horizontally
        drawH = areaH;
        drawW = areaH * imgAR;
        drawX = minX - (drawW - areaW) / 2;
        drawY = minY;
      } else {
        // Image taller — fit width, show middle portion
        drawW = areaW;
        drawH = areaW / imgAR;
        drawX = minX;
        drawY = minY - (drawH - areaH) * 0.18; // upper portion of cards, below top edge
      }
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(minX, minY, areaW, areaH, r);
      ctx.clip();
      ctx.drawImage(card.img, drawX, drawY, drawW, drawH);
      ctx.restore();
    } else {
      // Draw single card, maintaining 3:4 aspect ratio
      const pos = b.cards1[0];
      const r = Math.min(pos.w, pos.h) * 0.05;
      // Cover-crop for single card too
      const imgAR = card.img.width / card.img.height;
      const posAR = pos.w / pos.h;
      let drawW, drawH, drawX, drawY;
      if (imgAR > posAR) {
        drawH = pos.h; drawW = pos.h * imgAR;
        drawX = pos.x - (drawW - pos.w) / 2; drawY = pos.y;
      } else {
        drawW = pos.w; drawH = pos.w / imgAR;
        drawX = pos.x; drawY = pos.y - (drawH - pos.h) * 0.15;
      }
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 12;
      ctx.shadowOffsetY = 4;
      ctx.beginPath();
      ctx.roundRect(pos.x, pos.y, pos.w, pos.h, r);
      ctx.fillStyle = 'rgba(0,0,0,0.01)';
      ctx.fill();
      ctx.restore();
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(pos.x, pos.y, pos.w, pos.h, r);
      ctx.clip();
      ctx.drawImage(card.img, drawX, drawY, drawW, drawH);
      ctx.restore();
    }
  }

  // 3. Logo
  if (document.getElementById('showLogo').checked && logoImg) {
    const L = b.logo;
    const lw = L.maxW;
    const lh = lw * (logoImg.height / logoImg.width);
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.drawImage(logoImg, L.x, L.y, lw, lh);
    ctx.restore();
  }

  // 4. Headline — hardcoded position
  const HL = b.headline;
  const headText = v('headlineText');
  if (headText) {
    const font = v('headlineFont');
    const weight = v('headlineWeight');
    const color = v('headlineColor');
    const effect = v('textEffect');
    const ctaColor = v('ctaBg');

    ctx.save();
    const hlScale = n('headlineSizeScale') / 100;
    const hlSize = Math.round(HL.size * hlScale);
    ctx.font = `${weight} ${hlSize}px "${font}", sans-serif`;
    ctx.textAlign = HL.align;
    ctx.textBaseline = 'top';

    // Word wrap
    const words = headText.split(' ');
    const lines = [];
    let line = '';
    words.forEach(w => {
      const test = line ? line + ' ' + w : w;
      if (ctx.measureText(test).width > HL.maxW && line) {
        lines.push(line);
        line = w;
      } else {
        line = test;
      }
    });
    if (line) lines.push(line);

    const lineH = hlSize * 1.15;

    if (effect === 'glow') {
      ctx.shadowColor = hexRgba(ctaColor, 0.6);
      ctx.shadowBlur = hlSize * 0.4;
    } else if (effect === 'shadow') {
      ctx.shadowColor = 'rgba(0,0,0,0.7)';
      ctx.shadowBlur = hlSize * 0.15;
      ctx.shadowOffsetY = hlSize * 0.06;
    }
    ctx.fillStyle = color;
    lines.forEach((l, i) => ctx.fillText(l, HL.x, HL.y + i * lineH));
    ctx.restore();
  }

  // 5. CTA button — hardcoded position
  const CT = b.cta;
  const ctaText = v('ctaText');
  if (ctaText) {
    const bgCol = v('ctaBg');
    const radius = n('ctaRadius') * S;
    const ctScale = n('ctaSizeScale') / 100;
    const ctSize = Math.round(CT.size * ctScale);
    // Fixed button dimensions — font scales independently
    const bw = CT.bw;
    const bh = CT.bh;
    ctx.save();
    ctx.font = `700 ${ctSize}px "Plus Jakarta Sans", sans-serif`;
    // Shadow
    ctx.shadowColor = hexRgba(bgCol, 0.5);
    ctx.shadowBlur = 10;
    ctx.shadowOffsetY = 3;
    ctx.beginPath();
    ctx.roundRect(CT.x, CT.y, bw, bh, radius);
    ctx.fillStyle = bgCol;
    ctx.fill();
    // Text
    ctx.shadowColor = 'transparent';
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ctaText, CT.x + bw / 2, CT.y + bh / 2);
    ctx.restore();
  }

  return canvas;
}

function exportEachGirl() {
  // Export 300x250 for every single-card girl
  const singles = CARD_IMAGES.filter(c => c.type === 'single');
  if (!singles.length) { document.getElementById('snapStatus').textContent = 'No girl cards captured yet'; return; }
  const sel = document.getElementById('cardImage');
  const origVal = sel.value;
  let i = 0;
  function next() {
    if (i >= singles.length) { sel.value = origVal; renderAll(); return; }
    const card = singles[i];
    const idx = CARD_IMAGES.indexOf(card);
    sel.value = idx;
    renderAll();
    setTimeout(() => {
      const c = renderBanner('300x250', true, 1);
      if (c) {
        c.toBlob(blob => {
          if (!blob) { i++; next(); return; }
          const a = document.createElement('a');
          const name = card.name.toLowerCase().replace(/[^a-z0-9]/g, '');
          a.download = `lovetta_300x250_${name}.jpg`;
          a.href = URL.createObjectURL(blob);
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          i++;
          setTimeout(next, 300);
        }, 'image/jpeg', 0.99);
      } else { i++; next(); }
    }, 100);
  }
  next();
}

function renderAll() {
  Object.keys(BANNERS).forEach(k => renderBanner(k));
}

function exportBanner(key) {
  try {
    // Render at 1x — exact ad dimensions, no scaling, no quality loss
    const c = renderBanner(key, true, 1);
    if (!c) return;
    c.toBlob(blob => {
      if (!blob) return;
      const a = document.createElement('a');
      const ts = Date.now().toString(36).slice(-4);
      a.download = `lovetta_${key}_${ts}.jpg`;
      a.href = URL.createObjectURL(blob);
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

    if (e.message.includes('ainted'))

function renderVideoFrame() {
  if (!videoEl || videoEl.paused) return;
  const b = BANNERS['300x250'];
  const W = b.w * S, H = b.h * S;
  const ctx = videoCtx;

  // Background
  const grad = ctx.createLinearGradient(0, 0, W * 0.3, H);
  grad.addColorStop(0, v('bg1'));
  grad.addColorStop(1, v('bg2'));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Glow
  const glow = ctx.createRadialGradient(W * 0.3, H * 0.4, 0, W * 0.3, H * 0.4, Math.max(W, H) * 0.5);
  glow.addColorStop(0, hexRgba(v('ctaBg'), 0.06));
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // Draw video in the single-card position
  const pos = b.cards1[0];
  const r = Math.min(pos.w, pos.h) * 0.05;
  if (videoEl.readyState >= 2) {
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 12;
    ctx.shadowOffsetY = 4;
    ctx.beginPath();
    ctx.roundRect(pos.x, pos.y, pos.w, pos.h, r);
    ctx.fillStyle = 'rgba(0,0,0,0.01)';
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.beginPath();
    ctx.roundRect(pos.x, pos.y, pos.w, pos.h, r);
    ctx.clip();
    // Cover-crop video to fill card area
    const vidAR = videoEl.videoWidth / videoEl.videoHeight;
    const posAR = pos.w / pos.h;
    let sx = 0, sy = 0, sw = videoEl.videoWidth, sh = videoEl.videoHeight;
    if (vidAR > posAR) {
      sw = videoEl.videoHeight * posAR;
      sx = (videoEl.videoWidth - sw) / 2;
    } else {
      sh = videoEl.videoWidth / posAR;
      sy = (videoEl.videoHeight - sh) * 0.2;
    }
    ctx.drawImage(videoEl, sx, sy, sw, sh, pos.x, pos.y, pos.w, pos.h);
    ctx.restore();
  }

  // Logo
  if (document.getElementById('showLogo').checked && logoImg) {
    const L = b.logo;
    const lw = L.maxW;
    const lh = lw * (logoImg.height / logoImg.width);
    ctx.save(); ctx.globalAlpha = 0.85;
    ctx.drawImage(logoImg, L.x, L.y, lw, lh);
    ctx.restore();
  }

  // Headline
  const HL = b.headline;
  const headText = v('headlineText');
  if (headText) {
    const font = v('headlineFont');
    const weight = v('headlineWeight');
    const hlScale = n('headlineSizeScale') / 100;
    const hlSize = Math.round(HL.size * hlScale);
    ctx.save();
    ctx.font = `${weight} ${hlSize}px "${font}", sans-serif`;
    ctx.textAlign = HL.align;
    ctx.textBaseline = 'top';
    const words = headText.split(' ');
    const lines = [];
    let line = '';
    words.forEach(w => {
      const test = line ? line + ' ' + w : w;
      if (ctx.measureText(test).width > HL.maxW && line) { lines.push(line); line = w; }
      else line = test;
    });
    if (line) lines.push(line);
    const effect = v('textEffect');
    const ctaColor = v('ctaBg');
    if (effect === 'glow') { ctx.shadowColor = hexRgba(ctaColor, 0.6); ctx.shadowBlur = hlSize * 0.4; }
    else if (effect === 'shadow') { ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = hlSize * 0.15; ctx.shadowOffsetY = hlSize * 0.06; }
    ctx.fillStyle = v('headlineColor');
    lines.forEach((l, i) => ctx.fillText(l, HL.x, HL.y + i * hlSize * 1.15));
    ctx.restore();
  }

  // CTA
  const CT = b.cta;
  const ctaText = v('ctaText');
  if (ctaText) {
    const ctScale = n('ctaSizeScale') / 100;
    const ctSize = Math.round(CT.size * ctScale);
    ctx.save();
    ctx.font = `700 ${ctSize}px "Plus Jakarta Sans", sans-serif`;
    const bw = CT.bw, bh = CT.bh;
    const radius = n('ctaRadius') * S;
    ctx.shadowColor = hexRgba(v('ctaBg'), 0.5);
    ctx.shadowBlur = 10; ctx.shadowOffsetY = 3;
    ctx.beginPath(); ctx.roundRect(CT.x, CT.y, bw, bh, radius);
    ctx.fillStyle = v('ctaBg'); ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(ctaText, CT.x + bw / 2, CT.y + bh / 2);
    ctx.restore();
  }

  videoAnimId = requestAnimationFrame(renderVideoFrame);
}

  closeBtn.onclick = () => { if (snapVideoEl) snapVideoEl.pause(); snapContainer.remove(); snapContainer = null; };

  btnRow.appendChild(captureBtn);
  btnRow.appendChild(closeBtn);
  snapContainer.appendChild(info);
  snapContainer.appendChild(snapVideoEl);
  snapContainer.appendChild(btnRow);
  document.body.appendChild(snapContainer);

  document.getElementById('snapStatus').textContent = 'Playing ' + girl + '...';
}

async function captureSnap() {
  if (!snapVideoEl || snapVideoEl.readyState < 2) {
    document.getElementById('snapStatus').textContent = 'Video not ready yet. Wait for it to load.';
    return;
  }

  const girl = document.getElementById('snapGirl').value;
  snapVideoEl.pause();

  // Update button in overlay to show progress
  const capBtns = document.querySelectorAll('button');
  let capBtn = null;
  capBtns.forEach(b => { if (b.textContent.includes('Capture')) capBtn = b; });
  if (capBtn) { capBtn.textContent = '⏳ Saving...'; capBtn.style.opacity = '0.6'; }
  document.getElementById('snapStatus').textContent = 'Capturing ' + girl + '...';

  // Draw video frame to canvas at card size (300x400 = 3:4, optimized file size)
  const cw = 300, ch = 400;
  const c = document.createElement('canvas');
  c.width = cw; c.height = ch;
  const ctx = c.getContext('2d');

  // Cover-crop video into card aspect ratio
  const vidAR = snapVideoEl.videoWidth / snapVideoEl.videoHeight;
  const cardAR = cw / ch;
  let sx = 0, sy = 0, sw = snapVideoEl.videoWidth, sh = snapVideoEl.videoHeight;
  if (vidAR > cardAR) {
    sw = snapVideoEl.videoHeight * cardAR;
    sx = (snapVideoEl.videoWidth - sw) / 2;
  } else {
    sh = snapVideoEl.videoWidth / cardAR;
    sy = (snapVideoEl.videoHeight - sh) * 0.25;
  }
  ctx.drawImage(snapVideoEl, sx, sy, sw, sh, 0, 0, cw, ch);

  // Add card overlay: gradient at bottom
  const grad = ctx.createLinearGradient(0, ch * 0.55, 0, ch);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(0.5, 'rgba(0,0,0,0.4)');
  grad.addColorStop(1, 'rgba(0,0,0,0.75)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, cw, ch);

  // Round corners
  const r = 20;
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = cw; tempCanvas.height = ch;
  const tctx = tempCanvas.getContext('2d');
  tctx.beginPath();
  tctx.roundRect(0, 0, cw, ch, r);
  tctx.clip();
  tctx.drawImage(c, 0, 0);

  try {
    const blob = await new Promise((res, rej) => tempCanvas.toBlob(b => b ? res(b) : rej(new Error('toBlob failed')), 'image/png', 0.92));

    // Save via server
    const resp = await fetch('/save-card?name=' + encodeURIComponent(girl), {
      method: 'POST',
      headers: { 'Content-Type': 'image/png' },
      body: blob,
    });
    if (!resp.ok) throw new Error(await resp.text());

    // Reload the card image and add to dropdown
    const file = girl + '.png';
    const newImg = new Image();
    newImg.onload = () => {
      cardImages[file] = newImg;
      // Add to CARD_IMAGES if not already there
      if (!CARD_IMAGES.find(c => c.file === file)) {
        const name = girl.charAt(0).toUpperCase() + girl.slice(1);
        CARD_IMAGES.push({ name, file, type: 'single' });
      }
      buildCardDropdown();
      // Select this card in dropdown
      const idx = CARD_IMAGES.findIndex(c => c.file === file);
      if (idx >= 0) document.getElementById('cardImage').value = idx;
      renderAll();
    };
    newImg.src = URL.createObjectURL(blob);

    document.getElementById('snapStatus').textContent = '✓ ' + girl + '.png saved! Selected in banners.';
    if (capBtn) { capBtn.textContent = '✓ Saved! Capture Again'; capBtn.style.opacity = '1'; capBtn.style.background = 'linear-gradient(135deg,#22c55e,#16a34a)'; }
    // Reset button after 2s
    setTimeout(() => { if (capBtn) { capBtn.textContent = '📸 Capture This Frame'; capBtn.style.background = 'linear-gradient(135deg,#d6336c,#f43f5e)'; } }, 2000);
  } catch (e) {
    document.getElementById('snapStatus').textContent = '✗ Failed: ' + e.message;
    if (capBtn) { capBtn.textContent = '✗ Failed — Try Again'; capBtn.style.opacity = '1'; capBtn.style.background = '#dc2626'; }
    setTimeout(() => { if (capBtn) { capBtn.textContent = '📸 Capture This Frame'; capBtn.style.background = 'linear-gradient(135deg,#d6336c,#f43f5e)'; } }, 2000);
  }
}

// Force-load fonts
const fl = document.createElement('div');
fl.style.cssText = 'position:absolute;top:-9999px;visibility:hidden;';
['Outfit','Plus Jakarta Sans','Sora','Montserrat','Playfair Display'].forEach(f => {
  ['700','800','900'].forEach(w => {
    const s = document.createElement('span');
    s.style.cssText = `font-family:"${f}";font-weight:${w};font-size:48px;`;
    s.textContent = 'Test';
    fl.appendChild(s);
  });
});
document.body.appendChild(fl);
</script>
