<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Lovetta</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/brand/icon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/brand/icon-180.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#d6336c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    (function() {
      function isWideTabletShell() {
        var ua = navigator.userAgent || '';
        var platform = navigator.platform || '';
        var isIPad = /iPad/.test(ua) || (platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        return isIPad && window.innerWidth >= 768;
      }

      function syncWideTabletShell() {
        document.documentElement.classList.toggle('wide-tablet-shell', isWideTabletShell());
      }

      syncWideTabletShell();
      window.addEventListener('resize', syncWideTabletShell, { passive: true });
      window.addEventListener('orientationchange', syncWideTabletShell);
    })();
  </script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
